name: Cutter Desktop Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cutter-desktop-windows.yml"
      - "apps/cutter-desktop/**"
      - "apps/cutter-web/**"
      - "packages/**"
      - "scripts/acceptance/**"
      - "scripts/desktop/**"
      - "docs/acceptance/evidence/**"
      - "docs/acceptance/m18-1-windows-cutter-desktop.md"
      - "docs/acceptance/m18-3-github-actions-windows-package.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

permissions:
  contents: read

concurrency:
  group: cutter-desktop-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth 1 origin $env:GITHUB_SHA
          git checkout --force FETCH_HEAD

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run searchd tests
        run: npm run test:searchd

      - name: Run desktop packaging tests
        run: >
          node --test --import tsx
          scripts/desktop/windows-runtime.test.ts
          packages/cutter-api/src/desktop-sidecar.test.ts
          packages/desktop-runtime/src/index.test.ts
          apps/cutter-web/src/desktop-bridge.test.ts
          apps/cutter-desktop/src/tauri-config.test.ts

      - name: Package Windows desktop installer
        run: npm run package:cutter-desktop:windows

      - name: Capture installer evidence metadata
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/cutter-desktop/src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "No Windows installer .exe was produced"
          }
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "MIXLAB_WINDOWS_INSTALLER_FILE_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MIXLAB_WINDOWS_INSTALLER_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package target evidence kit
        run: npm run package:evidence-kit

      - name: Validate evidence kit manifest
        run: npm run validate:evidence-kit-manifest

      - name: Validate evidence kit draft metadata
        run: npm run validate:evidence-kit-drafts

      - name: Run packaged manifest self-check
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\dist\acceptance\mixlab-evidence-kit\evidence-kit-manifest-self-check.ps1 -KitDir .\dist\acceptance\mixlab-evidence-kit

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mixlab-cutter-windows-exe
          path: apps/cutter-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload target evidence kit
        uses: actions/upload-artifact@v4
        with:
          name: mixlab-target-evidence-kit
          path: dist/acceptance/mixlab-evidence-kit
          if-no-files-found: error
          retention-days: 14
