[package]
name = "mixlab-searchd"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
axum = "0.8.9"
rusqlite = { version = "0.40.0", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tantivy = "0.26.1"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal"] }
unicode-general-category = "1.1.0"

[dev-dependencies]
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
